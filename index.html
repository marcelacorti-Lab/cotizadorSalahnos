<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a2e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Cotizador JD</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --vd:#2d5a1b;--vo:#1a3610;--vc:#4a8c2a;--am:#f4c430;
  --bg:#0e1a0a;--bg2:#162010;--bg3:#1e2d14;
  --ca:#1f2e14;--cb:#263818;--br:#2e4420;
  --t1:#e8f0e0;--t2:#a8c490;--t3:#6a8a55;
  --r:16px;--rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);
  min-height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}

/* HEADER */
.hdr{background:linear-gradient(135deg,var(--vo),var(--bg2));border-bottom:2px solid var(--am);
  padding:14px 18px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100}
.hdr-brand{display:flex;align-items:center;gap:10px}
.jd{background:var(--am);color:var(--vo);font-family:'Syne',sans-serif;font-weight:800;
  font-size:13px;padding:4px 9px;border-radius:6px}
.hdr-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px}
.hdr-sub{font-size:10px;color:var(--t3);margin-top:1px}
.hdr-right{display:flex;gap:7px}
.ico-btn{background:var(--ca);border:1px solid var(--br);border-radius:9px;
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;color:var(--t2);transition:all .15s}
.ico-btn:active{background:var(--cb)}

/* LOGIN */
.login-screen{position:fixed;inset:0;background:var(--bg);z-index:500;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:20px}
.login-jd{background:var(--am);color:var(--vo);font-family:'Syne',sans-serif;
  font-weight:800;font-size:24px;padding:10px 20px;border-radius:10px}
.login-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700}
.login-sub{font-size:12px;color:var(--t3);text-align:center}
.login-card{background:var(--ca);border:1px solid var(--br);border-radius:var(--r);
  padding:24px;width:100%;max-width:340px}
.login-lbl{font-size:11px;font-weight:600;color:var(--t3);letter-spacing:.6px;
  text-transform:uppercase;margin-bottom:8px}
.pin-display{background:var(--bg3);border:1.5px solid var(--br);border-radius:var(--rs);
  padding:14px;text-align:center;font-family:'Syne',sans-serif;font-size:28px;
  letter-spacing:12px;color:var(--t1);margin-bottom:16px;min-height:58px}
.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.pk{background:var(--cb);border:1px solid var(--br);border-radius:var(--rs);
  padding:16px;font-size:20px;font-weight:600;text-align:center;cursor:pointer;
  color:var(--t1);transition:all .15s;user-select:none}
.pk:active{background:var(--vd);transform:scale(.95)}
.pk.del{font-size:16px;color:var(--t3)}
.pk.zero{grid-column:2}
.pin-enter{width:100%;background:var(--am);color:var(--vo);border:none;
  border-radius:var(--rs);padding:14px;font-family:'Syne',sans-serif;
  font-weight:700;font-size:15px;cursor:pointer}
.pin-enter:disabled{opacity:.4;cursor:not-allowed}
.pin-err{color:#e57070;font-size:12px;text-align:center;margin-top:8px;min-height:18px}

/* MAIN */
.main{flex:1;padding:14px;display:flex;flex-direction:column;gap:12px;padding-bottom:20px}

/* STATUS */
.status-bar{border-radius:var(--rs);padding:9px 13px;font-size:11px;
  display:flex;align-items:center;justify-content:space-between;border:1px solid}
.sb-ok{background:rgba(45,90,27,.25);border-color:var(--vd);color:var(--t2)}
.sb-load{background:var(--ca);border-color:var(--br);color:var(--t3)}
.sb-err{background:rgba(192,57,43,.15);border-color:rgba(192,57,43,.4);color:#e57070}
.sb-left{display:flex;align-items:center;gap:7px}
.sb-dot{width:7px;height:7px;border-radius:50%}
.dot-ok{background:#5db84a}.dot-spin{background:var(--am);animation:blink 1s infinite}.dot-err{background:#e57070}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.vchip{background:var(--cb);border:1px solid var(--br);border-radius:12px;
  padding:3px 10px;font-size:10px;font-weight:600;color:var(--t2)}

/* BUSCADOR */
.search-box{background:var(--ca);border:1.5px solid var(--br);border-radius:var(--r);
  padding:12px 14px;display:flex;align-items:center;gap:10px;transition:border-color .2s}
.search-box:focus-within{border-color:var(--am)}
.search-ico{font-size:18px;flex-shrink:0}
.search-input{flex:1;background:transparent;border:none;outline:none;
  color:var(--t1);font-size:15px;font-family:'Inter',sans-serif}
.search-input::placeholder{color:var(--t3)}
.search-clear{font-size:18px;cursor:pointer;color:var(--t3);flex-shrink:0;display:none}
.search-clear.on{display:block}

/* FILTROS */
.filtros{display:flex;gap:7px;flex-wrap:wrap}
.filtro-btn{background:var(--ca);border:1px solid var(--br);border-radius:18px;
  padding:6px 12px;font-size:12px;color:var(--t2);cursor:pointer;transition:all .2s}
.filtro-btn.on{background:var(--vd);border-color:var(--vc);color:#fff}
.filtro-btn:active{transform:scale(.97)}

/* BANCO FILTER */
.banco-tabs{display:flex;gap:7px}
.banco-tab{flex:1;background:var(--ca);border:1px solid var(--br);border-radius:var(--rs);
  padding:8px;text-align:center;font-size:12px;font-weight:600;color:var(--t3);
  cursor:pointer;transition:all .2s}
.banco-tab.on.bna{background:rgba(0,100,200,.25);border-color:rgba(0,100,200,.5);color:#7aaef0}
.banco-tab.on.gal{background:rgba(200,0,50,.2);border-color:rgba(200,0,50,.4);color:#f07090}
.banco-tab.on.todos{background:var(--vd);border-color:var(--vc);color:#fff}

/* RESULTADOS */
.sec-label{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.7px;
  text-transform:uppercase;margin-bottom:8px}

/* MAQUINA CARD */
.maq-card{background:var(--ca);border:1px solid var(--br);border-radius:var(--r);
  padding:13px;cursor:pointer;transition:all .2s;margin-bottom:8px}
.maq-card:hover,.maq-card.sel{background:var(--cb);border-color:var(--vc)}
.maq-card.sel{border-color:var(--am)}
.maq-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.maq-info{flex:1}
.maq-cod{font-size:10px;font-weight:700;color:var(--am);letter-spacing:1px;margin-bottom:2px}
.maq-nom{font-size:13px;font-weight:600;color:var(--t1);line-height:1.3;margin-bottom:3px}
.maq-desc{font-size:11px;color:var(--t3);line-height:1.4}
.maq-px{text-align:right;white-space:nowrap}
.px-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#fff}
.px-lbl{font-size:9px;color:var(--t3)}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:600;
  padding:2px 7px;border-radius:10px;margin-top:6px;border:1px solid}
.b-stock{background:rgba(45,90,27,.4);color:#7fc45e;border-color:var(--vd)}
.b-pedido{background:rgba(139,105,20,.3);color:#e0b44a;border-color:#8b6914}
.b-exc{background:rgba(45,90,27,.4);color:#7fc45e;border-color:var(--vd)}
.b-mb{background:rgba(45,90,27,.3);color:#9ed678;border-color:#3a6020}
.b-bue{background:rgba(60,80,20,.4);color:#b8cc70;border-color:#4a5a18}
.b-reg{background:rgba(139,105,20,.3);color:#e0b44a;border-color:#8b6914}

/* COTIZACION PANEL */
.cot-panel{background:var(--ca);border:1px solid var(--br);border-radius:var(--r);padding:14px}
.cot-maq-header{display:flex;align-items:center;justify-content:space-between;
  padding-bottom:12px;border-bottom:1px solid var(--br);margin-bottom:12px}
.cot-maq-nom{font-size:14px;font-weight:700;color:var(--t1)}
.cot-maq-px{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--am)}
.cot-sec-title{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.7px;
  text-transform:uppercase;margin-bottom:8px}

/* SLIDER ANTICIPO */
.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.slider-lbl{font-size:12px;color:var(--t2);white-space:nowrap}
.slider{flex:1;-webkit-appearance:none;height:4px;border-radius:2px;
  background:var(--br);outline:none}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;
  border-radius:50%;background:var(--am);cursor:pointer}
.slider-val{font-size:13px;font-weight:700;color:var(--am);min-width:60px;text-align:right}

/* LINEAS */
.banco-section{margin-bottom:12px}
.banco-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.banco-nm{font-size:13px;font-weight:700;color:var(--t1)}
.banco-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px}
.bb-bna{background:rgba(0,100,200,.3);color:#7aaef0;border:1px solid rgba(0,100,200,.4)}
.bb-gal{background:rgba(200,0,50,.25);color:#f07090;border:1px solid rgba(200,0,50,.3)}
.lin-card{background:var(--bg3);border:1px solid var(--br);border-radius:var(--rs);
  padding:11px;margin-bottom:7px}
.lin-nom{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:7px}
.lin-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
.d-lbl{font-size:9px;color:var(--t3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:1px}
.d-val{font-size:14px;font-weight:700;color:var(--t1)}
.d-val.hl{color:var(--am)}
.cuota-ban{background:linear-gradient(135deg,var(--vd),var(--vo));border:1px solid var(--vc);
  border-radius:var(--rs);padding:10px 13px;display:flex;align-items:center;
  justify-content:space-between;margin-bottom:5px}
.cuota-lbl{font-size:11px;color:var(--t2)}
.cuota-cap{font-size:10px;color:var(--t3);margin-top:1px}
.cuota-monto{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#fff}
.cuota-mes{font-size:10px;color:var(--t2);text-align:right}
.ant-row{display:flex;justify-content:space-between;padding:5px 0;
  border-top:1px solid var(--br);font-size:11px;color:var(--t3)}
.ant-val{font-weight:600;color:var(--t2)}
.obs-txt{font-size:10px;color:var(--t3);font-style:italic;line-height:1.4;
  padding-top:5px;border-top:1px solid var(--br);margin-top:2px}
.fuera-rango{opacity:.4;position:relative}
.fuera-tag{font-size:9px;color:#e57070;background:rgba(192,57,43,.2);
  border:1px solid rgba(192,57,43,.3);border-radius:8px;padding:2px 7px;margin-left:6px}
.sep{height:1px;background:var(--br);margin:3px 0 11px}
.sin-resultados{text-align:center;padding:32px 16px;color:var(--t3);font-size:13px;line-height:1.6}

/* ADMIN PANEL */
.admin-screen{position:fixed;inset:0;background:var(--bg);z-index:400;
  display:none;flex-direction:column;overflow:hidden}
.admin-screen.on{display:flex}
.admin-hdr{background:linear-gradient(135deg,#1a0a00,#2a1500);border-bottom:2px solid var(--am);
  padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.admin-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--am)}
.admin-close{background:var(--ca);border:1px solid var(--br);border-radius:8px;
  padding:6px 12px;font-size:13px;color:var(--t2);cursor:pointer}
.admin-tabs{display:flex;border-bottom:1px solid var(--br);flex-shrink:0}
.admin-tab{flex:1;padding:11px;text-align:center;font-size:12px;font-weight:600;
  color:var(--t3);cursor:pointer;border-bottom:2px solid transparent}
.admin-tab.on{color:var(--am);border-bottom-color:var(--am)}
.admin-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.admin-sec{background:var(--ca);border:1px solid var(--br);border-radius:var(--r);padding:14px}
.admin-sec-title{font-size:12px;font-weight:700;color:var(--am);letter-spacing:.6px;
  text-transform:uppercase;margin-bottom:12px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-item{background:var(--bg3);border:1px solid var(--br);border-radius:var(--rs);padding:12px}
.stat-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--am)}
.stat-lbl{font-size:10px;color:var(--t3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.vend-item{display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--br)}
.vend-item:last-child{border-bottom:none}
.vend-nom{font-size:14px;font-weight:600;color:var(--t1)}
.vend-pin{font-size:11px;color:var(--t3);font-family:monospace;margin-top:2px}
.vend-btns{display:flex;gap:6px}
.vbtn{border:1px solid var(--br);border-radius:7px;padding:5px 10px;
  font-size:11px;cursor:pointer;background:var(--cb);color:var(--t2)}
.vbtn.del{color:#e57070;border-color:rgba(192,57,43,.4)}
.add-form{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.add-inp{background:var(--bg3);border:1px solid var(--br);border-radius:var(--rs);
  color:var(--t1);font-size:13px;padding:9px 11px;outline:none;flex:1;min-width:100px}
.add-inp:focus{border-color:var(--am)}
.add-btn{background:var(--am);color:var(--vo);border:none;border-radius:var(--rs);
  padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer}
.add-msg{font-size:12px;margin-top:8px;min-height:16px}
.hist-table{width:100%;border-collapse:collapse;font-size:11px}
.hist-table th{color:var(--t3);font-weight:600;letter-spacing:.5px;text-transform:uppercase;
  padding:6px 4px;border-bottom:1px solid var(--br);text-align:left}
.hist-table td{padding:8px 4px;border-bottom:1px solid var(--br);color:var(--t1);vertical-align:top}
.hist-table tr:last-child td{border-bottom:none}
.tag-vend{background:rgba(244,196,48,.15);color:var(--am);border-radius:10px;
  padding:2px 7px;font-size:10px;font-weight:600}
.filter-sel{background:var(--bg3);border:1px solid var(--br);border-radius:var(--rs);
  color:var(--t1);font-size:12px;padding:7px 10px;outline:none}
.export-btn{background:var(--cb);border:1px solid var(--br);border-radius:var(--rs);
  color:var(--t2);font-size:12px;padding:7px 12px;cursor:pointer}
.hist-filters{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap}
.modal-save{width:100%;background:var(--am);color:var(--vo);border:none;border-radius:var(--rs);
  padding:13px;font-weight:700;font-size:14px;cursor:pointer;font-family:'Syne',sans-serif;margin-top:14px}
.modal-close{width:100%;background:transparent;color:var(--t3);border:1px solid var(--br);
  border-radius:var(--rs);padding:11px;font-size:13px;cursor:pointer;margin-top:8px}
.modal-lbl{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.5px;
  text-transform:uppercase;margin-bottom:5px;margin-top:12px}
.modal-inp{width:100%;background:var(--ca);border:1px solid var(--br);border-radius:var(--rs);
  color:var(--t1);font-size:12px;padding:10px 12px;font-family:monospace;outline:none}
.modal-inp:focus{border-color:var(--am)}
.modal-hint{font-size:10px;color:var(--t3);line-height:1.4;margin-top:4px}

/* LOADING */
.ld{display:inline-flex;gap:4px;align-items:center}
.ld span{width:6px;height:6px;border-radius:50%;background:var(--am);
  animation:dp 1.2s ease-in-out infinite}
.ld span:nth-child(2){animation-delay:.2s}
.ld span:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
::-webkit-scrollbar{width:0}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-jd">JD</div>
  <div class="login-title">Cotizador Agro</div>
  <div class="login-sub">Ingresá tu PIN para continuar</div>
  <div class="login-card">
    <div class="login-lbl">Tu PIN</div>
    <div class="pin-display" id="pinDisplay">- - - -</div>
    <div class="pinpad">
      <div class="pk" onclick="pk('1')">1</div><div class="pk" onclick="pk('2')">2</div><div class="pk" onclick="pk('3')">3</div>
      <div class="pk" onclick="pk('4')">4</div><div class="pk" onclick="pk('5')">5</div><div class="pk" onclick="pk('6')">6</div>
      <div class="pk" onclick="pk('7')">7</div><div class="pk" onclick="pk('8')">8</div><div class="pk" onclick="pk('9')">9</div>
      <div class="pk del" onclick="pd()">⌫</div><div class="pk zero" onclick="pk('0')">0</div>
    </div>
    <button class="pin-enter" id="pinEnter" onclick="pinLogin()" disabled>Ingresar</button>
    <div class="pin-err" id="pinErr"></div>
  </div>
</div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-brand">
    <div class="jd">JD</div>
    <div>
      <div class="hdr-title">Cotizador Agro</div>
      <div class="hdr-sub" id="hdrSub">BNA · GALICIA</div>
    </div>
  </div>
  <div class="hdr-right">
    <button class="ico-btn" id="adminBtn" style="display:none" onclick="openAdmin()">🛡️</button>
    <button class="ico-btn" onclick="cerrarSesion()">🚪</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- STATUS -->
  <div class="status-bar sb-load" id="statusBar">
    <div class="sb-left">
      <div class="sb-dot dot-spin" id="sbDot"></div>
      <span id="sbTxt">Cargando datos...</span>
    </div>
    <div class="vchip" id="vchip"></div>
  </div>

  <!-- BUSCADOR -->
  <div class="search-box">
    <span class="search-ico">🔍</span>
    <input class="search-input" id="searchInput" placeholder="Buscá una máquina..." 
      oninput="onSearch()" />
    <span class="search-clear" id="searchClear" onclick="clearSearch()">✕</span>
  </div>

  <!-- FILTROS TIPO -->
  <div class="filtros" id="filtrosTipo">
    <button class="filtro-btn on" onclick="setFiltro('todos')">Todas</button>
    <button class="filtro-btn" onclick="setFiltro('nueva')">🆕 Nuevas</button>
    <button class="filtro-btn" onclick="setFiltro('usada')">♻️ Usadas</button>
    <button class="filtro-btn" onclick="setFiltro('tractores')">🚜 Tractores</button>
    <button class="filtro-btn" onclick="setFiltro('cosechadoras')">Cosechadoras</button>
    <button class="filtro-btn" onclick="setFiltro('sembradoras')">Sembradoras</button>
    <button class="filtro-btn" onclick="setFiltro('pulverizadoras')">Pulverizadoras</button>
  </div>

  <!-- LISTA MAQUINAS -->
  <div id="maqSection">
    <div class="sec-label">Máquinas disponibles</div>
    <div id="maqList"><div style="text-align:center;padding:20px;color:var(--t3)"><div class="ld"><span></span><span></span><span></span></div></div></div>
  </div>

  <!-- PANEL COTIZACION -->
  <div id="cotPanel" style="display:none">
    <div class="cot-panel">
      <div class="cot-maq-header">
        <div>
          <div style="font-size:10px;font-weight:700;color:var(--am);letter-spacing:1px;margin-bottom:3px" id="cotCodigo"></div>
          <div class="cot-maq-nom" id="cotNombre"></div>
          <div style="font-size:11px;color:var(--t3);margin-top:2px" id="cotDesc"></div>
        </div>
        <div style="text-align:right">
          <div class="cot-maq-px" id="cotPrecio"></div>
          <div style="font-size:9px;color:var(--t3)">USD</div>
          <button style="margin-top:6px;background:var(--bg3);border:1px solid var(--br);
            border-radius:8px;padding:4px 10px;font-size:11px;color:var(--t2);cursor:pointer"
            onclick="volverLista()">✕ Cambiar</button>
        </div>
      </div>

      <!-- ANTICIPO SLIDER -->
      <div class="cot-sec-title">Anticipo</div>
      <div class="slider-row">
        <span class="slider-lbl">% Anticipo</span>
        <input type="range" class="slider" id="anticipoSlider" min="10" max="50" value="20" step="5" oninput="recalcular()">
        <span class="slider-val" id="anticipoVal">20% — USD 0</span>
      </div>

// ── SUPABASE ─────────────────────────────────
async function sbGet(tabla,params=""){
  const r=await fetch(`${SB_URL}/rest/v1/${tabla}?${params}`,{headers:SB_HDR});
  if(!r.ok) throw new Error("Supabase "+r.status);
  return r.json();
}
async function sbPost(tabla,data){
  const r=await fetch(`${SB_URL}/rest/v1/${tabla}`,{
    method:"POST",headers:{...SB_HDR,"Prefer":"resolution=merge-duplicates,return=minimal"},
    body:JSON.stringify(data)
  });
  return r.status;
}
async function sbPatch(tabla,filtro,data){
  const r=await fetch(`${SB_URL}/rest/v1/${tabla}?${filtro}`,{
    method:"PATCH",headers:{...SB_HDR,"Prefer":"return=minimal"},body:JSON.stringify(data)
  });
  return r.status;
}
async function sbDelete(tabla,filtro){
  const r=await fetch(`${SB_URL}/rest/v1/${tabla}?${filtro}`,{method:"DELETE",headers:SB_HDR});
  return r.status;
}

    const matchTipo=tipoFiltro==="todos"||m.tipo===tipoFiltro||

// ── RENDER MÁQUINAS ───────────────────────────

}
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fUSD(n){ return "USD "+Math.round(n).toLocaleString("es-AR"); }

// ── CÁLCULO ───────────────────────────────────
function calcFrancesa(capital,tna,n){
  const tem=Math.pow(1+tna/100,1/12)-1;
  if(tem===0) return capital/n;
  return capital*tem*Math.pow(1+tem,n)/(Math.pow(1+tem,n)-1);
}
function calcCapInt(capital,tna,n){
  const tem=Math.pow(1+tna/100,1/12)-1;
  return capital/n+capital*tem;
}

function recalcular(){
  if(!maqSeleccionada) return;
  const px=parseFloat(maqSeleccionada.precio_usd||0);
  const antPct=parseInt(document.getElementById("anticipoSlider").value);
  const antUSD=px*antPct/100;
  document.getElementById("anticipoVal").innerText=`${antPct}% — ${fUSD(antUSD)}`;

  const bancos=bancoFiltro==="todos"
    ?["Banco Nación","Banco Galicia"]
    :[bancoFiltro];

  let html="";
  bancos.forEach(banco=>{
    const lineas=FINANCIACION.filter(f=>f.banco===banco&&f.activo!==false);
    if(!lineas.length) return;
    const bCls=banco.includes("Nación")?"bb-bna":"bb-gal";
    const bLbl=banco.includes("Nación")?"BNA":"GALICIA";
    html+=`<div class="banco-section">
      <div class="banco-hdr">
        <div class="banco-nm">${esc(banco)}</div>
        <div class="banco-badge ${bCls}">${bLbl}</div>
      </div>`;

    lineas.forEach(lin=>{
      const tna=parseFloat(lin.tna_pct||0);
      const plazo=parseInt(lin.plazo_meses||0);
      const antMin=parseFloat(lin.anticipo_min_pct||0);
      const montoMax=parseFloat(lin.monto_max_usd||0);
      const sis=lin.sistema_cuotas||"Francesa";
      const fueraRango=px>montoMax;

      // Usar el anticipo del slider si es >= mínimo de la línea, sino usar el mínimo
      const antEfectivo=Math.max(antPct,antMin);
      const capital=px*(1-antEfectivo/100);
      const anticipo=px*antEfectivo/100;
      const cuota=sis==="Francesa"?calcFrancesa(capital,tna,plazo):calcCapInt(capital,tna,plazo);

      html+=`<div class="lin-card ${fueraRango?'fuera-rango':''}">
        <div class="lin-nom">${esc(lin.linea)}${fueraRango?'<span class="fuera-tag">Monto excedido</span>':''}</div>
        <div class="lin-grid">
          <div><div class="d-lbl">TNA</div><div class="d-val hl">${tna}%</div></div>
          <div><div class="d-lbl">Plazo</div><div class="d-val">${plazo} meses</div></div>
          <div><div class="d-lbl">Sistema</div><div class="d-val" style="font-size:12px">${esc(sis)}</div></div>
          <div><div class="d-lbl">Anticipo mín.</div><div class="d-val">${antMin}%</div></div>
        </div>`;
      if(!fueraRango){
        html+=`<div class="cuota-ban">
          <div>
            <div class="cuota-lbl">${sis==="Francesa"?"Cuota fija":"1ra cuota"}</div>
            <div class="cuota-cap">Capital: ${fUSD(capital)}</div>
          </div>
          <div>
            <div class="cuota-monto">${fUSD(cuota)}</div>
            <div class="cuota-mes">/mes</div>
          </div>
        </div>
        <div class="ant-row">
          <span>Anticipo ${antEfectivo>antPct?`(mín. ${antMin}%)`:`(${antEfectivo}%)`}</span>
          <span class="ant-val">${fUSD(anticipo)}</span>
        </div>`;
      }
      html+=`<div class="obs-txt">ℹ️ ${esc(lin.observaciones||lin.destino||"")}</div></div>`;
    });
    html+=`</div><div class="sep"></div>`;
  });

  document.getElementById("lineasContent").innerHTML=html||'<div class="sin-resultados">Sin líneas disponibles para este banco.</div>';
}

async function filtrarHist(){

  const code=await sbPost("vendedores",{nombre:nom,pin,activo:true});
  if(code===201||code===200){ msg.style.color="#7fc45e"; msg.innerText="✅ Vendedor agregado"; setTimeout(()=>adminTab("vendedores"),800); }
  else{ msg.style.color="#e57070"; msg.innerText="Error (¿PIN ya existe?)"; }
}

function exportCSV(){
  const rows=window._histRows||[];
  if(!rows.length) return;
  const h=["Fecha","Vendedor","Código","Máquina","USD"];
  const lines=rows.map(r=>[
    new Date(r.created_at).toLocaleString("es-AR"),
    r.vendedor_nombre||"",r.maquinaria_cod||"",r.maquinaria_nom||"",
    r.precio_usd?Math.round(r.precio_usd):""
  ].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(","));
  const csv=[h.join(","),...lines].join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));
  a.download=`cotizaciones_${new Date().toISOString().split("T")[0]}.csv`;
  a.click();
}

if(savedId&&savedNom){
  vendedorActual={id:parseInt(savedId),nombre:savedNom};
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("vchip").innerText=savedNom;
  document.getElementById("hdrSub").innerText=savedNom+" · BNA · GALICIA";
  if(S.get("isAdmin")==="1") document.getElementById("adminBtn").style.display="flex";
  cargarDatos();
}
